<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhang Cutz - فەرهەنگ کەتس</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            background: black;
            overflow-x: hidden;
        }

        /* Stars Background */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url("https://www.transparenttextures.com/patterns/stardust.png");
            animation: move 60s linear infinite;
            z-index: -1;
        }

        @keyframes move {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 1000px; }
        }

        /* Barber Pole */
        .pole {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 35px;
            height: 130px;
            background: repeating-linear-gradient(
                45deg,
                #ff0000 0px, #ff0000 10px,
                #ffffff 10px, #ffffff 20px,
                #0051ff 20px, #0051ff 30px
            );
            border-radius: 20px;
            border: 2px solid #555;
            animation: spin 3s linear infinite;
            z-index: 10;
        }

        @keyframes spin {
            0% { background-position: 0 0; }
            100% { background-position: 0 200px; }
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 25px;
            margin-top: 40px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 213, 0.2);
        }

        .logo { width: 180px; margin-bottom: 10px; }

        .time {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 12px;
            margin: 15px auto;
            width: fit-content;
            border: 1px solid #00ffd5;
            color: #00ffd5;
            font-weight: bold;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            border-right: 5px solid #00ffd5;
            text-align: right;
            font-size: 14px;
            line-height: 1.8;
        }
        .info-box p { margin: 5px 0; }
        .info-box i { color: #00ffd5; margin-left: 10px; }
        .vip-alert { color: #ffcc00 !important; font-weight: bold; }

        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .price-card {
            background: #151515;
            padding: 20px 10px;
            border-radius: 15px;
            border: 1px solid #00ffd5;
            color: #00ffd5;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 213, 0.1);
        }

        .price-card:hover { 
            background: #00ffd5; 
            color: black; 
            transform: scale(1.03); 
        }

        .booking-form {
            margin-top: 35px;
            padding: 20px;
            background: #0d0d0d;
            border-radius: 20px;
            border: 1px solid #222;
        }

        .input-group {
            text-align: right;
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
            margin-right: 15px;
        }

        .booking-form input, .booking-form select {
            width: 90%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            text-align: center;
            font-size: 15px;
        }

        /* ستایل بۆ ناوەڕاستکردنی دەق لەناو خانەکانی کات و بەروار */
        input[type="date"], input[type="time"] {
            text-align: center;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            direction: ltr;
        }

        .btn-send {
            width: 95%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 17px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .whatsapp-btn { background: #25D366; }
        .viber-btn { background: #7360f2; }
        
        .btn-send:hover { opacity: 0.8; transform: translateY(-2px); }

        .contact-icons { margin-top: 30px; display: flex; justify-content: center; gap: 20px; }
        .contact-icons a { font-size: 30px; color: white; text-decoration: none; transition: 0.3s; }
        .fa-whatsapp { color: #25D366; }
        .fa-viber { color: #7360f2; }
        .fa-phone { color: #00b7ff; }

        .footer-info {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #222;
            font-size: 13px;
            color: #888;
        }
        .footer-info b { color: #00ffd5; }
        
        .phone-num {
            display: inline-block;
            direction: ltr;
            unicode-bidi: embed;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="pole"></div>

<div class="container">
    <img src="logo.png" class="logo" alt="Farhang Cutz">
    <h1>Farhang Cutz</h1>

    <div class="time">
        <i class="fa-solid fa-clock"></i> کاتی کارکردن: 2PM - 11PM
    </div>

    <div class="info-box">
        <p><i class="fa-solid fa-calendar-check"></i> ڕۆژێک پێش سەردانی کردن حجز بکە.</p>
        <p><i class="fa-solid fa-triangle-exclamation"></i> پێش کاتی خۆی لە دوکان ئامادە بن، بە پێچەوانەوە حجزەکەتان ئەفەوتێ.</p>
        <p class="vip-alert"><i class="fa-solid fa-star"></i> بۆ کاتکردنی VIP لە ١٠ی بەیانی بۆ ١٢ی نیوەڕۆ، ڕۆژێک پێش مۆعیدەکە حجز بکەن.</p>
    </div>

    <h2>خزمەتگوزارییەکان</h2>
    <div class="price-grid">
        <div class="price-card">سەر
