<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhang Cutz | Official Website</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --main-cyan: #00ffd5; --bg-black: #000000; }
        
        body { 
            background-color: var(--bg-black); 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* --- باکگراوندی ئەستێرە جوڵاوەکان --- */
        #star-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: black;
        }

        .container { max-width: 480px; margin: auto; padding: 15px; position: relative; z-index: 1; }

        /* لۆگۆ و بەشی سەرەوە */
        .logo-img { width: 170px; height: 170px; border-radius: 50%; margin-top: 15px; border: 2px solid #fff; background: white; }
        h1 { font-size: 30px; margin: 10px 0; }
        
        .work-time {
            border: 1.5px solid var(--main-cyan);
            color: var(--main-cyan);
            padding: 8px 20px;
            border-radius: 12px;
            display: inline-block;
            font-weight: bold;
            margin-bottom: 20px;
            background: rgba(0, 255, 213, 0.05);
        }

        /* کاردی تێبینییەکان */
        .note-card {
            background: rgba(15, 15, 15, 0.9);
            border-right: 4px solid var(--main-cyan);
            border-radius: 15px;
            padding: 15px;
            text-align: right;
            margin-bottom: 25px;
        }
        .note-item { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; font-size: 14px; }

        /* بەشی خزمەتگوزارییەکان */
        .section-title { font-size: 20px; margin-bottom: 15px; color: #fff; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .service-btn {
            border: 1px solid var(--main-cyan);
            background: rgba(0, 255, 213, 0.02);
            color: var(--main-cyan);
            padding: 12px 5px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
        }

        /* بەشی حجز */
        .booking-box { background: rgba(15, 15, 15, 0.95); padding: 20px; border-radius: 20px; border: 1px solid #1a1a1a; }
        input, select {
            width: 100%; padding: 12px; margin: 6px 0;
            background: #0f0f0f; border: 1px solid #222;
            color: white; border-radius: 8px; box-sizing: border-box; text-align: right;
        }

        .btn-send { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; margin-top: 8px; cursor: pointer; font-size: 15px; }
        .whatsapp { background: #2ecc71; color: #000; }
        .viber { background: #8e44ad; color: #fff; }

        /* سۆشیاڵ میدیا - ڕێک وەک وێنەکە */
        .social-area { margin-top: 35px; display: flex; justify-content: center; gap: 15px; }
        .social-circle {
            width: 50px; height: 50px; border-radius: 50%;
            border: 1.5px solid var(--main-cyan);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; text-decoration: none; color: var(--main-cyan);
        }

        .footer { margin-top: 25px; font-size: 14px; color: #fff; line-height: 1.8; }
        .footer span { color: var(--main-cyan); font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <div class="container">
        <img src="logo.png" class="logo-img">
        <h1>Farhang Cutz</h1>
        <div class="work-time">کاتی کارکردن: 2PM - 11PM 🕒</div>

        <div class="note-card">
            <div class="note-item">📅 ڕۆژێک پێش سەردانی کردن حجز بکە.</div>
            <div class="note-item">⚠️ پێش کاتی خۆی ئامادە بن، دەنا حجزەکە ئەفەوێت.</div>
            <div class="note-item" style="color: #f1c40f;">⭐ بۆ VIP بەیانیان 10 بۆ 12 حجز بکەن.</div>
        </div>

        <h2 class="section-title">خزمەتگوزارییەکان</h2>
        <div id="userServicesGrid" class="services-grid">
            </div>

        <div class="booking-box">
            <h2 class="section-title">داواکردنی حجز</h2>
            <input id="userName" placeholder="ناوی سیانی">
            <input id="userPhone" placeholder="ژمارەی مۆبایل">
            <select id="serviceSelect"><option value="">هەڵبژاردنی خزمەتگوزاری</option></select>
            
            <p style="text-align: right; margin: 8px 5px 2px 0; font-size: 12px; color: #777;">بەرواری حجزکردن</p>
            <input type="date" id="bookDate">
            
            <p style="text-align: right; margin: 8px 5px 2px 0; font-size: 12px; color: #777;">کاتژمێری حجزکردن</p>
            <input type="time" id="bookTime">

            <button class="btn-send whatsapp" onclick="send('WA')">ناردن بۆ واتسئەپ</button>
            <button class="btn-send viber" onclick="send('VB')">ناردن بۆ ڤایبەر</button>
        </div>

        <div class="social-area">
            <a href="viber://chat?number=9647766924732" class="social-circle">📱</a>
            <a href="https://wa.me/9647766924732" class="social-circle">💬</a>
            <a href="tel:07766924732" class="social-circle">📞</a>
        </div>

        <div class="footer">
            Website created by: <span>Haryad Khalid</span><br>
            📲 0776 692 47 32
        </div>
    </div>

    <script>
        // سکرێپتی باکگراوندی ئەستێرەکان
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speed = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speed;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // فایەربەیس
        const firebaseConfig = { apiKey: "AIza...", projectId: "farhang-cutz" }; 
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("services").onSnapshot(snap => {
            const grid = document.getElementById("userServicesGrid");
            const select = document.getElementById("serviceSelect");
            grid.innerHTML = "";
            snap.forEach(doc => {
                const name = doc.data().name;
                grid.innerHTML += `<div class="service-btn">${name}</div>`;
                select.innerHTML += `<option value="${name}">${name}</option>`;
            });
        });

        function send(platform) {
            const name = document.getElementById("userName").value;
            const phone = document.getElementById("userPhone").value;
            const service = document.getElementById("serviceSelect").value;
            const date = document.getElementById("bookDate").value;
            const time = document.getElementById("bookTime").value;

            if(!name || !date || !time) return alert("تکایە هەموو زانیارییەکان پڕ بکەرەوە");

            const msg = `*حجزی نوێ*%0A👤 ناو: ${name}%0A📱 مۆبایل: ${phone}%0A✂️ خزمەتگوزاری: ${service}%0A📅 بەروار: ${date}%0A⏰ کات: ${time}`;
            const url = platform === 'WA' ? `https://wa.me/9647766924732?text=${msg}` : `viber://chat?number=9647766924732&text=${msg}`;
            window.open(url);
        }
    </script>
</body>
</html>
