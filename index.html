<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farhang Cutz</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<style>
body{background:#000;color:#fff;text-align:center;font-family:sans-serif}
.container{max-width:500px;margin:auto;padding:20px}
.time-slot{padding:10px;margin:5px;border-radius:20px;display:inline-block}
.time-free{border:1px solid #00ffd5;color:#00ffd5}
.time-booked{background:red;color:#fff}
.time-selected{background:#00ffd5;color:#000}
#loginBox{display:none;position:fixed;width:100%;height:100%;background:#000a;top:0;left:0;justify-content:center;align-items:center}
</style>
</head>

<body>
<div class="container">

<h2>Farhang Cutz</h2>

<label>حجزکردنی بەروار</label>
<input type="date" id="bookDate" onchange="renderTimeSlots()">

<label>حجز کردنی کات</label>
<input type="time" id="bookTime">

<div id="timeSlots"></div>

<input id="userName" placeholder="ناو">

<button onclick="send()">ناردن</button>

<button onclick="loginAdmin()" style="color:white;opacity:0.2">Admin</button>

<div id="adminPanel" style="display:none">
<h3>حجزەکان</h3>
<div id="bookingList"></div>
</div>

</div>

<!-- LOGIN -->
<div id="loginBox">
<div style="background:#111;padding:20px;border-radius:10px">
<h3>🔐 Login</h3>
<input id="adminPass" type="password">
<button onclick="checkLogin()">چوونە ژوورەوە</button>
</div>
</div>

<script>
// Firebase config
firebase.initializeApp({
apiKey:"AIzaSyC-Wq9",
projectId:"farhang-cutz",
messagingSenderId:"PUT-SENDER-ID",
appId:"PUT-APP-ID"
});

const db=firebase.firestore();
const messaging=firebase.messaging();

let allBookings=[];
let firstLoad=true;

// 🔔 notification permission
Notification.requestPermission();

// 📲 push token
async function initPush(){
try{
const token=await messaging.getToken({
vapidKey:"PUT-YOUR-VAPID-KEY"
});
db.collection("tokens").add({token});
}catch(e){console.log(e)}
}
initPush();

// 🧠 fake service worker inside page (fallback)
if("serviceWorker" in navigator){
const swCode=`
self.addEventListener('push',function(e){
const data=e.data.json();
self.registration.showNotification(data.title,{
body:data.body,
icon:'logo.png'
});
});
`;
const blob=new Blob([swCode],{type:'text/javascript'});
const url=URL.createObjectURL(blob);
navigator.serviceWorker.register(url);
}

// ⏰ time slots
function renderTimeSlots(){
const date=document.getElementById("bookDate").value;
const box=document.getElementById("timeSlots");
box.innerHTML="";

for(let h=14;h<=23;h++){
["00","30"].forEach(m=>{
let time=\`\${String(h).padStart(2,'0')}:\${m}\`;

let busy=allBookings.some(b=>{
if(b.date!==date)return false;
let t1=new Date(date+"T"+time);
let t2=new Date(b.date+"T"+b.time);
return Math.abs(t1-t2)/60000<30;
});

let div=document.createElement("div");
div.classList.add("time-slot");

if(busy){
div.classList.add("time-booked");
div.innerText=time+" ❌";
}else{
div.classList.add("time-free");
div.innerText=time;
div.onclick=()=>{
document.querySelectorAll(".time-slot").forEach(e=>e.classList.remove("time-selected"));
div.classList.add("time-selected");
document.getElementById("bookTime").value=time;
};
}

box.appendChild(div);
});
}
}

// 📊 realtime + notification
db.collection("bookings").onSnapshot(snap=>{
allBookings=[];
document.getElementById("bookingList").innerHTML="";

snap.forEach(doc=>{
let b=doc.data();
allBookings.push(b);

document.getElementById("bookingList").innerHTML+=\`
<div>\${b.name} - \${b.time}</div>\`;
});

// 🔔 notify
if(!firstLoad){
snap.docChanges().forEach(change=>{
if(change.type==="added"){
let b=change.doc.data();

new Notification("📅 حجزی نوێ",{
body:\`\${b.name} - \${b.time}\`,
icon:"logo.png"
});

let audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
audio.play();
}
});
}
firstLoad=false;

renderTimeSlots();
});

// 📤 send booking + WhatsApp
function send(){
let name=document.getElementById("userName").value;
let date=document.getElementById("bookDate").value;
let time=document.getElementById("bookTime").value;

if(!name||!date||!time)return alert("تکایە هەموو خانەکان پڕ بکەرەوە");

db.collection("bookings").add({name,date,time});

// push trigger
db.collection("notifications").add({
title:"📅 حجزی نوێ",
body:\`\${name} - \${time}\`
});

// WhatsApp auto
let msg=\`حجزی نوێ%0A\${name}%0A\${date}%0A\${time}\`;
window.open(\`https://wa.me/9647700526746?text=\${msg}\`);

alert("✅ نێردرا");
}

// 🔐 login
function loginAdmin(){
document.getElementById("loginBox").style.display="flex";
}
function checkLogin(){
if(document.getElementById("adminPass").value==="1234"){
document.getElementById("adminPanel").style.display="block";
document.getElementById("loginBox").style.display="none";
}else alert("❌ پاسۆرد هەڵەیە");
}
</script>

</body>
</html>
