<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhang Cutz | وێبسایتی فەرمی</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --main-cyan: #00ffd5; --red: #ff4444; --bg: #000; --card: #0a0a0a; }
        body { background: var(--bg); color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 550px; margin: auto; padding-bottom: 50px; }

        /* Header & Logo */
        .logo-area { margin-top: 30px; position: relative; display: flex; justify-content: center; align-items: center; }
        .logo-img { width: 190px; height: 190px; border-radius: 50%; border: 1px solid #fff; padding: 3px; background: #fff; object-fit: cover; }
        .barber-pole { position: absolute; right: 20px; top: -10px; width: 45px; height: 140px; background: repeating-linear-gradient(-45deg, #fff, #fff 15px, #f00 15px, #f00 30px, #fff 30px, #fff 45px, #00f 45px, #00f 60px); border-radius: 30px; border: 4px solid #333; box-shadow: 0 0 15px rgba(255,255,255,0.1); z-index: 10; }
        
        h1 { font-size: 35px; margin: 20px 0 10px; letter-spacing: 1px; }
        .work-time { display: inline-block; border: 1px solid var(--main-cyan); color: var(--main-cyan); padding: 12px 30px; border-radius: 15px; font-weight: bold; margin-bottom: 25px; font-size: 16px; background: rgba(0, 255, 213, 0.05); }

        /* Services Grid */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .service-item { border: 1.5px solid var(--main-cyan); color: var(--main-cyan); padding: 18px 5px; border-radius: 15px; font-size: 15px; font-weight: bold; }

        /* Booking Section */
        .booking-section { margin-top: 50px; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #1a1a1a; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; background: #111; color: white; box-sizing: border-box; text-align: right; font-size: 16px; }
        .label-text { display: block; text-align: right; color: #888; font-size: 14px; margin: 15px 10px 5px 0; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }

        .btn-whatsapp { background: #2ecc71; color: #000; border: none; font-weight: bold; padding: 18px; width: 100%; border-radius: 12px; margin-top: 20px; cursor: pointer; font-size: 17px; }
        .btn-viber { background: #8e44ad; color: white; border: none; font-weight: bold; padding: 18px; width: 100%; border-radius: 12px; margin-top: 12px; cursor: pointer; font-size: 17px; }

        /* Admin Panel Styles */
        .admin-box { background: var(--card); border: 2px dashed var(--main-cyan); border-radius: 20px; padding: 20px; margin-top: 30px; display: none; text-align: right; }
        .admin-section { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .btn-add { background: var(--main-cyan); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-delete { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .list-item { display: flex; justify-content: space-between; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 5px; align-items: center; }

        /* Social Icons & Footer */
        .social-icons { margin-top: 40px; display: flex; justify-content: center; gap: 25px; }
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 2px solid var(--main-cyan); color: var(--main-cyan); text-decoration: none; }
        .created-by { margin-top: 35px; color: #fff; font-size: 15px; }
        .created-by span { color: var(--main-cyan); font-weight: bold; }
        .holiday-msg { background: rgba(255, 68, 68, 0.1); color: var(--red); padding: 15px; border-radius: 12px; border: 1px solid var(--red); margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="barber-pole"></div>
        <img src="logo.png" class="logo-img" alt="Farhang Cutz"> 
    </div>
    <h1>Farhang Cutz</h1>
    <div class="work-time">🕒 کاتی کارکردن: 2PM - 11PM</div>

    <div id="userServicesGrid" class="services-grid"></div>

    <div class="booking-section">
        <h3>داواکردنی حجز</h3>
        <input id="userName" placeholder="ناوی سیانی">
        <input id="userPhone" placeholder="ژمارەی مۆبایل">
        
        <select id="serviceSelect">
            <option value="">هەڵبژاردنی جۆری کار</option>
            </select>

        <span class="label-text">بەرواری حجزکردن</span>
        <input type="date" id="bookDate" onchange="checkStatus(this.value)">
        <div id="holidayMsg" class="holiday-msg">ببوورە لەم ڕۆژەدا کار ناکەین 🚩</div>

        <span class="label-text">کاتژمێری حجزکردن</span>
        <input type="time" id="bookTime">

        <button class="btn-whatsapp" onclick="send('WA')">ناردن بۆ وەتسئەپ</button>
        <button class="btn-viber" onclick="send('VB')">ناردن بۆ ڤایبەر</button>
    </div>

    <div id="adminPanel" class="admin-box">
        <h2 style="color:var(--main-cyan); text-align:center;">بەڕێوەبردن</h2>
        
        <div class="admin-section">
            <h3>✂️ خزمەتگوزارییەکان</h3>
            <input type="text" id="newServiceName" placeholder="ناوی خزمەتگوزاری">
            <button class="btn-add" onclick="addService()">زیادکردن</button>
            <div id="adminServicesList" style="margin-top:15px;"></div>
        </div>

        <div class="admin-section">
            <h3>📅 ڕۆژانی پشوو</h3>
            <input type="date" id="holidayDate">
            <button class="btn-add" onclick="addHoliday()">تۆمارکردنی پشوو</button>
            <div id="adminHolidaysList" style="margin-top:15px;"></div>
        </div>

        <div class="admin-section">
            <h3>📑 لیستی حجزەکان</h3>
            <div id="adminBookingsList"></div>
        </div>

        <button onclick="location.reload()" style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:10px;">داخستنی پانێڵ</button>
    </div>

    <button onclick="adminLogin()" style="background:transparent; color:#222; border:none; margin-top:50px; cursor:pointer;">Admin Login</button>

    <div class="social-icons">
        <a href="viber://chat?number=9647700526746" class="icon-circle">📞</a>
        <a href="https://wa.me/9647700526746" class="icon-circle">💬</a>
        <a href="tel:07700526746" class="icon-circle">📱</a>
    </div>

    <div class="created-by">
        Website created by: <span>Haryad Khalid</span><br>
        📲 0770 052 6746
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-Wq9GZw1iXJO44ItfTNCHAaRTc8xVD1I",
  authDomain: "farhang-cutz.firebaseapp.com",
  projectId: "farhang-cutz",
  storageBucket: "farhang-cutz.firebasestorage.app",
  messagingSenderId: "281170796987",
  appId: "1:281170796987:web:4eaa46cbd150f1f567249e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let holidays = [];

// بارکردنی داتا بۆ بەکارهێنەر و ئەدمین
function initData() {
    // بارکردنی خزمەتگوزارییەکان
    db.collection("services").onSnapshot(snap => {
        const grid = document.getElementById("userServicesGrid");
        const select = document.getElementById("serviceSelect");
        const adminList = document.getElementById("adminServicesList");
        
        grid.innerHTML = "";
        select.innerHTML = '<option value="">هەڵبژاردنی جۆری کار</option>';
        adminList.innerHTML = "";

        snap.forEach(doc => {
            const s = doc.data();
            grid.innerHTML += `<div class="service-item">${s.name}</div>`;
            select.innerHTML += `<option>${s.name}</option>`;
            adminList.innerHTML += `<div class="list-item"><span>${s.name}</span><button class="btn-delete" onclick="deleteDoc('services','${doc.id}')">❌</button></div>`;
        });
    });

    // بارکردنی پشووەکان
    db.collection("holidays").onSnapshot(snap => {
        holidays = [];
        const adminHolidays = document.getElementById("adminHolidaysList");
        adminHolidays.innerHTML = "";
        snap.forEach(doc => {
            holidays.push(doc.data().date);
            adminHolidays.innerHTML += `<div class="list-item"><span>${doc.data().date}</span><button class="btn-delete" onclick="deleteDoc('holidays','${doc.id}')">❌</button></div>`;
        });
    });
}

function checkStatus(date) {
    document.getElementById("holidayMsg").style.display = holidays.includes(date) ? "block" : "none";
}

function addService() {
    const name = document.getElementById("newServiceName").value;
    if(name) db.collection("services").add({name}).then(() => document.getElementById("newServiceName").value = "");
}

function addHoliday() {
    const date = document.getElementById("holidayDate").value;
    if(date) db.collection("holidays").add({date});
}

function deleteDoc(col, id) {
    if(confirm("دڵنیای لە سڕینەوە؟")) db.collection(col).doc(id).delete();
}

function send(platform) {
    let name = document.getElementById("userName").value;
    let phone = document.getElementById("userPhone").value;
    let service = document.getElementById("serviceSelect").value;
    let date = document.getElementById("bookDate").value;
    let time = document.getElementById("bookTime").value;

    if(!name || !time || !date || !service) return alert("تکایە هەموو زانیارییەکان تەواو بکە");
    if(holidays.includes(date)) return alert("ببوورە ئەمڕۆ پشووە");

    db.collection("bookings").add({name, phone, service, date, time}).then(() => {
        let msg = `*حجزی نوێ*%0A👤 ناو: ${name}%0A📱 مۆبایل: ${phone}%0A✂️ کار: ${service}%0A📅 بەروار: ${date}%0A⏰ کات: ${time}`;
        window.open(platform === 'WA' ? `https://wa.me/9647700526746?text=${msg}` : `viber://forward?text=${msg}`);
    });
}

function adminLogin() {
    if(prompt("Password:") === "102030") {
        document.getElementById("adminPanel").style.display = "block";
        loadBookings();
    }
}

function loadBookings() {
    db.collection("bookings").orderBy("date", "desc").onSnapshot(snap => {
        const list = document.getElementById("adminBookingsList");
        list.innerHTML = "";
        snap.forEach(doc => {
            const b = doc.data();
            list.innerHTML += `<div style="background:#111; padding:10px; margin-bottom:5px; border-radius:10px; border-right:3px solid var(--main-cyan);">
                <b>${b.name}</b> - ${b.date} (${b.time})<br><small>${b.service} | ${b.phone}</small>
                <button onclick="deleteDoc('bookings','${doc.id}')" style="background:none; border:none; color:red; cursor:pointer; float:left;">🗑️</button>
            </div>`;
        });
    });
}

initData();
</script>
</body>
</html>
