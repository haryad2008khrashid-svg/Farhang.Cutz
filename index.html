<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhang Cutz | Official</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --main-cyan: #00ffd5; 
            --bg: #000; 
            --glass: rgba(15, 15, 15, 0.9); 
            --booked-red: #ff4d4d; 
        }

        body { 
            background: var(--bg); 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        #star-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .container { max-width: 500px; margin: auto; padding: 20px; position: relative; z-index: 1; }
        
        .logo-img { width: 160px; height: 160px; border-radius: 50%; border: 2px solid #fff; margin-top: 20px; background: white; }
        
        .work-time { border: 1.5px solid var(--main-cyan); color: var(--main-cyan); padding: 10px 25px; border-radius: 12px; display: inline-block; margin: 15px 0; font-weight: bold; background: var(--glass); }
        
        .notes-box { background: var(--glass); border-right: 4px solid var(--main-cyan); border-radius: 10px; padding: 15px; text-align: right; margin-bottom: 25px; }
        .note-normal { color: var(--main-cyan); font-size: 14px; margin-bottom: 8px; }
        .note-vip { color: #f1c40f; font-size: 14px; font-weight: bold; }

        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .service-item { border: 1.5px solid var(--main-cyan); color: var(--main-cyan); padding: 15px 5px; border-radius: 12px; font-weight: bold; font-size: 14px; background: var(--glass); }

        .booking-section { background: var(--glass); padding: 25px; border-radius: 20px; margin-top: 30px; border: 1px solid #333; }
        
        input, select { width: 100%; padding: 15px; margin: 8px 0; background: #0a0a0a; border: 1px solid #444; color: white; border-radius: 10px; text-align: right; box-sizing: border-box; font-size: 15px; position: relative; }
        
        /* تێبینی ناو خانەکان */
        .date-input-wrap::before { content: "تکایە بەرواری حیجز کردن دیاری بکە"; position: absolute; right: 15px; top: 25px; color: #888; pointer-events: none; z-index: 1; font-size: 13px; }
        .time-input-wrap::before { content: "تکایە کاتی حیجز کردن دیاری بکە"; position: absolute; right: 15px; top: 25px; color: #888; pointer-events: none; z-index: 1; font-size: 13px; }
        
        input:focus + div, input:valid + div { display: none; }
        .hide-placeholder::before { display: none !important; }

        .booked-error { border-color: var(--booked-red) !important; color: var(--booked-red) !important; box-shadow: 0 0 10px var(--booked-red); }

        .btn-send { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .whatsapp { background: #25D366; color: white; }
        .viber { background: #7360f2; color: white; }

        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 35px; background: var(--glass); padding: 15px; border-radius: 50px; width: fit-content; margin: 35px auto; }
        .social-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--main-cyan); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 24px; }
        
        .footer { margin-top: 30px; font-size: 15px; background: var(--glass); padding: 10px; border-radius: 10px; display: inline-block; direction: ltr; }
        .footer span { color: var(--main-cyan); font-weight: bold; }

        .admin-btn { background: transparent; border: 1px solid white; color: white; margin: 40px auto; padding: 10px 25px; border-radius: 20px; cursor: pointer; display: block; }
        
        #adminPanel { display: none; background: #111; padding: 20px; border: 2px dashed var(--main-cyan); border-radius: 20px; margin-top: 20px; text-align: right; }
        .admin-item { display: flex; justify-content: space-between; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>
    <div class="container">
        <img src="logo.png" class="logo-img">
        <h1 style="background: var(--glass); padding: 5px 20px; border-radius: 10px;">Farhang Cutz</h1>
        <div class="work-time">کاتی کارکردن: 2PM - 11PM 🕒</div>

        <div class="notes-box">
            <div class="note-normal">📅 ڕۆژێک پێش سەردانی کردن حجز بکە.</div>
            <div class="note-normal">⚠️ پێش کاتی خۆی ئامادە بن، دەنا حجزەکە ئەفەوێت.</div>
            <div class="note-vip">⭐ کاتکردن Vip 10 بەیانی بۆ ١٢ نیوەرۆ <br> رۆژێک پێش مۆعیدەکە حیجز بکەن</div>
        </div>

        <h2 style="background: var(--glass); padding: 5px 15px; border-radius: 8px; display: inline-block; font-size: 18px;">خزمەتگوزارییەکان</h2>
        <div id="userServicesGrid" class="services-grid"></div>

        <div class="booking-section">
            <h2 style="font-size: 18px; margin-bottom: 15px;">داواکردنی حجز</h2>
            <input id="userName" placeholder="ناوی سیانی">
            <input id="userPhone" placeholder="ژمارەی مۆبایل">
            <select id="serviceSelect"></select>
            
            <div class="date-input-wrap" id="dateWrap">
                <input type="date" id="bookDate" onchange="checkInputs(this); validateBooking();" onfocus="hideLabel('dateWrap')">
            </div>
            
            <div class="time-input-wrap" id="timeWrap">
                <input type="time" id="bookTime" onchange="checkInputs(this); validateBooking();" onfocus="hideLabel('timeWrap')">
            </div>
            
            <div id="statusMsg" style="margin-top:10px; font-weight:bold; font-size: 14px;"></div>

            <button class="btn-send whatsapp" onclick="send('WA')"><i class="fab fa-whatsapp"></i> ناردن بۆ واتسئەپ</button>
            <button class="btn-send viber" onclick="send('VB')"><i class="fab fa-viber"></i> ناردن بۆ ڤایبەر</button>
        </div>

        <div class="social-links">
            <a href="viber://chat?number=9647766924732" class="social-circle"><i class="fab fa-viber" style="color: #7360f2;"></i></a>
            <a href="https://wa.me/9647766924732" class="social-circle"><i class="fab fa-whatsapp" style="color: #25D366;"></i></a>
            <a href="tel:07766924732" class="social-circle"><i class="fas fa-phone" style="color: #3498db;"></i></a>
        </div>
        
        <div class="footer">Website created by: <span>Haryad Khalid</span><br>0776 692 47 32 📲</div>

        <button class="admin-btn" onclick="loginAdmin()">بەشی ئەدمین (Login)</button>
        
        <div id="adminPanel">
            <h3>بەڕێوەبردن</h3>
            <input id="newS" placeholder="ناوی خزمەتگوزاری">
            <button onclick="addS()" style="width:100%; padding:10px; background:var(--main-cyan); border:none; font-weight:bold; border-radius:10px;">زیادکردنی خزمەتگوزاری</button>
            <div id="adminSList" style="margin:15px 0;"></div>
            <hr>
            <input type="date" id="hDate">
            <button onclick="addH()" style="width:100%; padding:10px; background:red; border:none; color:white; border-radius:10px;">دیاریکردنی پشوو</button>
            <div id="hList" style="margin-top:10px;"></div>
            <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; margin-top:15px; background:#444; color:white; border:none; padding:10px; border-radius:10px;">داخستن</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        class Star { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.sp = Math.random()*0.4; } draw() { ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } update() { this.y -= this.sp; if(this.y<0) this.y=canvas.height; } }
        for(let i=0; i<150; i++) stars.push(new Star());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{s.draw(); s.update();}); requestAnimationFrame(anim); } anim();

        const firebaseConfig = { apiKey: "AIza...", projectId: "farhang-cutz" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let holidays = [];
        let allBookings = [];

        function hideLabel(id) { document.getElementById(id).classList.add('hide-placeholder'); }
        function checkInputs(el) { if(!el.value) el.parentElement.classList.remove('hide-placeholder'); }

        db.collection("services").onSnapshot(snap => {
            const grid = document.getElementById("userServicesGrid");
            const select = document.getElementById("serviceSelect");
            const adminList = document.getElementById("adminSList");
            grid.innerHTML = ""; select.innerHTML = '<option value="">هەڵبژاردنی خزمەتگوزاری</option>'; adminList.innerHTML = "";
            snap.forEach(doc => {
                grid.innerHTML += `<div class="service-item">${doc.data().name}</div>`;
                select.innerHTML += `<option>${doc.data().name}</option>`;
                adminList.innerHTML += `<div class="admin-item"><span>${doc.data().name}</span><button onclick="delS('${doc.id}')">❌</button></div>`;
            });
        });

        db.collection("holidays").onSnapshot(snap => {
            holidays = [];
            const list = document.getElementById("hList"); list.innerHTML = "";
            snap.forEach(doc => {
                holidays.push(doc.data().date);
                list.innerHTML += `<div class="admin-item"><span>${doc.data().date}</span><button onclick="delH('${doc.id}')">❌</button></div>`;
            });
        });

        db.collection("bookings").onSnapshot(snap => {
            allBookings = [];
            snap.forEach(doc => allBookings.push(doc.data()));
        });

        function validateBooking() {
            const dateInput = document.getElementById("bookDate");
            const timeInput = document.getElementById("bookTime");
            const msg = document.getElementById("statusMsg");
            const d = dateInput.value;
            const t = timeInput.value;

            if (holidays.includes(d)) {
                dateInput.classList.add("booked-error");
                msg.innerHTML = "ببورە ئەم ڕۆژە پشووە 🚩";
                msg.style.color = "red";
                return false;
            } else {
                dateInput.classList.remove("booked-error");
            }

            if (d && t) {
                const newT = new Date(`${d}T${t}`);
                let isBusy = false;
                allBookings.forEach(b => {
                    if (b.date === d) {
                        const exT = new Date(`${b.date}T${b.time}`);
                        const diff = Math.abs(newT - exT) / (1000 * 60);
                        if (diff < 30) isBusy = true;
                    }
                });
                if (isBusy) {
                    timeInput.classList.add("booked-error");
                    msg.innerHTML = "ئەم کاتە حجز کراوە یان زۆر نزیکە ❌";
                    msg.style.color = "red";
                    return false;
                } else {
                    timeInput.classList.remove("booked-error");
                    msg.innerHTML = "ئەم کاتە بەردەستە ✅";
                    msg.style.color = "#00ffd5";
                }
            }
            return true;
        }

        function loginAdmin() { if(prompt("Password:") === "1234") document.getElementById("adminPanel").style.display="block"; }
        function addS() { const n = document.getElementById("newS").value; if(n) db.collection("services").add({name:n}); }
        function delS(id) { db.collection("services").doc(id).delete(); }
        function addH() { const d = document.getElementById("hDate").value; if(d) db.collection("holidays").add({date:d}); }
        function delH(id) { db.collection("holidays").doc(id).delete(); }

        function send(p) {
            if (!validateBooking()) return;
            const name = document.getElementById("userName").value;
            const service = document.getElementById("serviceSelect").value;
            const date = document.getElementById("bookDate").value;
            const time = document.getElementById("bookTime").value;
            if(!name || !date || !time) return alert("تکایە خانەکان پڕ بکەرەوە");
            db.collection("bookings").add({name, service, date, time});
            const msg = `*حجزی نوێ*%0Aناو: ${name}%0Aکار: ${service}%0Aبەروار: ${date}%0Aکات: ${time}`;
            window.open(p === 'WA' ? `https://wa.me/9647766924732?text=${msg}` : `viber://chat?number=9647766924732&text=${msg}`);
        }
    </script>
</body>
</html>
