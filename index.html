<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhang Cutz - Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --main-cyan: #00ffd5; --error-red: #ff4d4d; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; text-align: center; background: black; overflow-x: hidden; }
        
        /* Background Stars */
        .stars { position: fixed; width: 100%; height: 100%; background: url("https://www.transparenttextures.com/patterns/stardust.png"); animation: move 60s linear infinite; z-index: -1; }
        @keyframes move { 0% { background-position: 0 0; } 100% { background-position: 1000px 1000px; } }

        .container { max-width: 600px; margin: auto; padding: 20px; background: rgba(0, 0, 0, 0.9); border-radius: 25px; margin-top: 40px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 255, 213, 0.2); }
        
        .logo { width: 150px; margin-bottom: 10px; }
        .vip-alert { color: #ffcc00 !important; font-weight: bold; font-size: 14px; border: 1px solid #ffcc00; padding: 10px; border-radius: 10px; margin: 15px 0; }

        /* Price Grid & Services */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .price-card { 
            background: #151515; padding: 15px; border-radius: 12px; border: 1px solid var(--main-cyan); 
            color: var(--main-cyan); font-weight: bold; position: relative; transition: 0.3s;
        }
        .delete-btn { 
            position: absolute; top: -8px; left: -8px; background: red; color: white; 
            border-radius: 50%; width: 22px; height: 22px; font-size: 14px; 
            cursor: pointer; display: none; line-height: 20px; border: 2px solid white;
        }

        /* Forms */
        .booking-form { margin-top: 30px; padding: 20px; background: #0d0d0d; border-radius: 20px; border: 1px solid #222; }
        input, select, button { 
            width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 10px; 
            border: 1px solid #333; background: #1a1a1a; color: white; text-align: center; font-size: 15px;
        }
        .input-error { border: 2px solid var(--error-red) !important; color: var(--error-red) !important; }
        .btn-send { background: #25D366; font-weight: bold; cursor: pointer; border: none; font-size: 17px; }
        .off-day-banner { background: rgba(255, 77, 77, 0.2); color: var(--error-red); padding: 15px; border-radius: 15px; display: none; margin-bottom: 15px; border: 1px solid var(--error-red); }

        /* Admin Section */
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; font-size: 12px; color: #444; cursor: pointer; opacity: 0.5; }
        #adminPanel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 400px; background: #111; border: 2px solid var(--main-cyan); 
            padding: 25px; border-radius: 20px; z-index: 1000; box-shadow: 0 0 50px black;
        }
        .admin-close { background: #444; margin-top: 10px; }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="container">
    <img src="logo.png" class="logo" alt="Farhang Cutz">
    <h1 style="color: var(--main-cyan); margin-bottom: 5px;">Farhang Cutz</h1>
    
    <div id="offDayBanner" class="off-day-banner">⚠️ ببوورە، ئەمڕۆ دوکان داخراوە و حجز وەرناگیرێت.</div>

    <div class="vip-alert">
        <i class="fa-solid fa-star"></i> بۆ کاتکردنی VIP لە ١٠ی بەیانی بۆ ١٢ی نیوەڕۆ، ڕۆژێک پێش مۆعیدەکە حجز بکەن.
    </div>

    <h2>خزمەتگوزارییەکان</h2>
    <div class="price-grid" id="servicesGrid">
        </div>

    <div class="booking-form" id="bookingArea">
        <h2>داواکردنی حجز</h2>
        <p id="statusLabel" style="font-size: 13px;"></p>
        
        <input id="uName" placeholder="ناوی تەواو">
        <input id="uPhone" type="tel" placeholder="ژمارەی مۆبایل">
        
        <select id="uServiceSelect"></select>

        <input type="date" id="uDate" onchange="checkStatus()">
        <input type="time" id="uTime" oninput="checkStatus()">
        
        <button class="btn-send" onclick="sendBooking()">
            <i class="fa-brands fa-whatsapp"></i> ناردن بۆ واتسەپ
        </button>
    </div>
</div>

<div class="admin-trigger" onclick="promptLogin()">Admin Login</div>

<div id="adminPanel">
    <h3 style="color: var(--main-cyan)">بەڕێوەبردنی سیستم</h3>
    <hr border="0" height="1" bgcolor="#333">
    
    <p style="font-size: 13px;">زیادکردنی خزمەتگوزاری نوێ:</p>
    <input id="newServiceName" placeholder="ناوی خزمەتگوزاری">
    <button onclick="addService()" style="background: var(--main-cyan); color: black;">زیادکردن</button>
    
    <hr border="0" height="1" bgcolor="#333">
    <p style="font-size: 13px;">قفلکردنی ڕۆژ (OFF):</p>
    <input type="date" id="offDateInput">
    <button onclick="setOffDay()" style="background: orange; color: black;">دیاریکردنی وەک OFF</button>
    
    <button class="admin-close" onclick="logout()">Logout</button>
</div>

<script>
    // --- Data Storage ---
    let services = JSON.parse(localStorage.getItem('f_services')) || ["سەرچاکردن", "سەر و ڕیش", "VIP", "هایدرۆفیشاڵ"];
    let offDays = JSON.parse(localStorage.getItem('f_offdays')) || [];
    let allBookings = JSON.parse(localStorage.getItem('f_all_bookings')) || [];
    const ADMIN_KEY = "1234";

    function init() {
        renderServices();
        checkStatus();
    }

    function renderServices() {
        const grid = document.getElementById('servicesGrid');
        const select = document.getElementById('uServiceSelect');
        grid.innerHTML = '';
        select.innerHTML = '';

        services.forEach((s, index) => {
            grid.innerHTML += `
                <div class="price-card">
                    <span class="delete-btn" onclick="removeService(${index})">×</span>
                    ${s}
                </div>`;
            select.innerHTML += `<option value="${s}">${s}</option>`;
        });
    }

    // --- Admin Logic ---
    function promptLogin() {
        let pass = prompt("تکایە پاسۆرد بنووسە:");
        if(pass === ADMIN_KEY) {
            document.getElementById('adminPanel').style.display = 'block';
            document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'block');
        } else if(pass !== null) {
            alert("پاسۆرد هەڵەیە!");
        }
    }

    function logout() {
        document.getElementById('adminPanel').style.display = 'none';
        document.querySelectorAll('.delete-btn').forEach(b => b.style.display = 'none');
    }

    function addService() {
        let val = document.getElementById('newServiceName').value;
        if(val) {
            services.push(val);
            localStorage.setItem('f_services', JSON.stringify(services));
            renderServices();
            document.getElementById('newServiceName').value = '';
        }
    }

    function removeService(index) {
        if(confirm("دڵنیای لە سڕینەوەی ئەم خزمەتگوزارییە؟")) {
            services.splice(index, 1);
            localStorage.setItem('f_services', JSON.stringify(services));
            renderServices();
        }
    }

    function setOffDay() {
        let date = document.getElementById('offDateInput').value;
        if(date) {
            if(!offDays.includes(date)) {
                offDays.push(date);
                localStorage.setItem('f_offdays', JSON.stringify(offDays));
                alert("ئەم ڕۆژە وەک پشوو دیاریکرا");
                checkStatus();
            } else {
                alert("ئەم ڕۆژە پێشتر دیاریکراوە");
            }
        }
    }

    // --- Booking Logic ---
    function checkStatus() {
        const dateVal = document.getElementById('uDate').value;
        const timeVal = document.getElementById('uTime').value;
        const banner = document.getElementById('offDayBanner');
        const area = document.getElementById('bookingArea');
        const statusLabel = document.getElementById('statusLabel');
        const timeInput = document.getElementById('uTime');

        // Check if Off Day
        if(offDays.includes(dateVal)) {
            banner.style.display = 'block';
            area.style.opacity = '0.3';
            area.style.pointerEvents = 'none';
            return;
        } else {
            banner.style.display = 'none';
            area.style.opacity = '1';
            area.style.pointerEvents = 'all';
        }

        // Check 20 min overlap & Red Color
        if(dateVal && timeVal) {
            const newTime = new Date(`${dateVal}T${timeVal}`).getTime();
            const overlap = allBookings.some(b => {
                const oldTime = new Date(`${b.date}T${b.time}`).getTime();
                return Math.abs(newTime - oldTime) < (20 * 60 * 1000);
            });

            if(overlap) {
                timeInput.classList.add('input-error');
                statusLabel.innerText = "❌ ئەم کاتە گیراوە، کاتێکی تر هەڵبژێرە";
                statusLabel.style.color = "var(--error-red)";
            } else {
                timeInput.classList.remove('input-error');
                statusLabel.innerText = "✅ ئەم کاتە بەردەستە";
                statusLabel.style.color = "var(--main-cyan)";
            }
        }
    }

    function sendBooking() {
        const name = document.getElementById('uName').value;
        const phone = document.getElementById('uPhone').value;
        const service = document.getElementById('uServiceSelect').value;
        const date = document.getElementById('uDate').value;
        const time = document.getElementById('uTime').value;

        if(!name || !date || !time) return alert("تکایە خانەکان پڕ بکەرەوە");

        // Save locally to track overlaps
        allBookings.push({date, time});
        localStorage.setItem('f_all_bookings', JSON.stringify(allBookings));

        const text = `*حجزی نوێ - Farhang Cutz*%0A👤 ناو: ${name}%0A📞 مۆبایل: ${phone}%0A✂️ خزمەتگوزاری: ${service}%0A📅 بەروار: ${date}%0A⏰ کات: ${time}`;
        window.open(`https://wa.me/9647700526746?text=${text}`);
    }

    init();
</script>

</body>
</html>
