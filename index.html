<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhang Cutz | Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --main-cyan: #00ffd5; --red: #ff4444; --bg: #000; --card: #0a0a0a; }
        body { background: var(--bg); color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 550px; margin: auto; padding-bottom: 50px; }
        
        /* Styles for Admin Panel */
        .admin-box { background: var(--card); border: 2px solid var(--main-cyan); border-radius: 20px; padding: 20px; margin-top: 30px; display: none; text-align: right; }
        .admin-section { margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        .btn-add { background: var(--main-cyan); color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-delete { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        
        /* Service Buttons Grid */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .service-item { border: 1.5px solid var(--main-cyan); color: var(--main-cyan); padding: 15px; border-radius: 15px; font-weight: bold; position: relative; }
        
        .booking-item { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--main-cyan); }
        .holiday-item { display: flex; justify-content: space-between; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" style="width:150px; border-radius:50%; margin-top:20px;">
    <h1>Farhang Cutz</h1>

    <div id="userServicesGrid" class="services-grid"></div>

    <hr style="margin:40px 0; border:0; border-top:1px solid #222;">

    <button onclick="adminLogin()" style="background:transparent; color:#333; border:none; cursor:pointer;">Admin Login</button>

    <div id="adminPanel" class="admin-box">
        <h2 style="color:var(--main-cyan); text-align:center;">بەڕێوەبردن</h2>

        <div class="admin-section">
            <h3>✂️ خزمەتگوزارییەکان</h3>
            <input type="text" id="newServiceName" placeholder="ناوی خزمەتگوزاری (بۆ نموونە: چاکردنی ڕیش)">
            <button class="btn-add" onclick="addService()">زیادکردن</button>
            <div id="adminServicesList" style="margin-top:15px;"></div>
        </div>

        <div class="admin-section">
            <h3>📅 دیاریکردنی پشوو</h3>
            <input type="date" id="holidayDate">
            <button class="btn-add" onclick="addHoliday()">تۆمارکردنی پشوو</button>
            <div id="adminHolidaysList" style="margin-top:15px;"></div>
        </div>

        <div class="admin-section">
            <h3>📑 حجزەکان</h3>
            <div id="adminBookingsList"></div>
        </div>

        <button onclick="location.reload()" style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:10px;">داخستنی پانێڵ</button>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyC-Wq9GZw1iXJO44ItfTNCHAaRTc8xVD1I",
  authDomain: "farhang-cutz.firebaseapp.com",
  projectId: "farhang-cutz",
  storageBucket: "farhang-cutz.firebasestorage.app",
  messagingSenderId: "281170796987",
  appId: "1:281170796987:web:4eaa46cbd150f1f567249e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ١. بارکردنی خزمەتگوزارییەکان
function loadServices() {
    db.collection("services").onSnapshot(snap => {
        const userGrid = document.getElementById("userServicesGrid");
        const adminList = document.getElementById("adminServicesList");
        userGrid.innerHTML = "";
        adminList.innerHTML = "";
        
        snap.forEach(doc => {
            const s = doc.data();
            // بۆ بەکارهێنەر
            userGrid.innerHTML += `<div class="service-item">${s.name}</div>`;
            // بۆ ئەدمین (بۆ سڕینەوە)
            adminList.innerHTML += `
                <div class="holiday-item">
                    <span>${s.name}</span>
                    <button class="btn-delete" onclick="deleteDoc('services', '${doc.id}')">سڕینەوە</button>
                </div>`;
        });
    });
}

// ٢. زیادکردنی خزمەتگوزاری نوێ
function addService() {
    const name = document.getElementById("newServiceName").value;
    if(!name) return;
    db.collection("services").add({ name: name }).then(() => {
        document.getElementById("newServiceName").value = "";
    });
}

// ٣. زیادکردنی پشوو
function addHoliday() {
    const date = document.getElementById("holidayDate").value;
    if(!date) return;
    db.collection("holidays").add({ date: date });
}

// ٤. بارکردنی پشووەکان بۆ ئەدمین
function loadHolidays() {
    db.collection("holidays").onSnapshot(snap => {
        const list = document.getElementById("adminHolidaysList");
        list.innerHTML = "";
        snap.forEach(doc => {
            list.innerHTML += `
                <div class="holiday-item">
                    <span>${doc.data().date}</span>
                    <button class="btn-delete" onclick="deleteDoc('holidays', '${doc.id}')">سڕینەوە</button>
                </div>`;
        });
    });
}

// ٥. سڕینەوەی هەر دۆکیومێنتێک
function deleteDoc(col, id) {
    if(confirm("دڵنیای لە سڕینەوە؟")) {
        db.collection(col).doc(id).delete();
    }
}

// ٦. بارکردنی حجزەکان
function loadBookings() {
    db.collection("bookings").orderBy("date", "desc").onSnapshot(snap => {
        const list = document.getElementById("adminBookingsList");
        list.innerHTML = "";
        snap.forEach(doc => {
            const b = doc.data();
            list.innerHTML += `
                <div class="booking-item">
                    <b>${b.name}</b><br>
                    📅 ${b.date} | ⏰ ${b.time}<br>
                    ✂️ ${b.service} | 📱 ${b.phone}
                    <button class="btn-delete" onclick="deleteDoc('bookings', '${doc.id}')" style="margin-top:10px; width:100%;">سڕینەوەی حجز</button>
                </div>`;
        });
    });
}

function adminLogin() {
    let p = prompt("Password:");
    if(p === "102030") {
        document.getElementById("adminPanel").style.display = "block";
        loadServices();
        loadHolidays();
        loadBookings();
        window.scrollTo(0, document.body.scrollHeight);
    }
}

// دەستپێکردن
loadServices();
</script>
</body>
</html>
